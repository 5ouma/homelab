name: 🚀 Deploy

on:
  push:
    branches:
      - main
    paths:
      - "**/compose.yml"
      - "**/config/**"
      - .github/workflows/deploy.yml
      - .env.tmpl

permissions: {}

jobs:
  detect:
    name: 🔍 Detect Changed Compose Files
    runs-on: Ubuntu-Slim
    timeout-minutes: 1
    outputs:
      compose: ${{ steps.detect.outputs.compose }}

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Detect changed compose files
        id: detect
        uses: ./.github/actions/detect-changed-compose

  fetch:
    name: 🔄 Fetch Repository
    permissions:
      id-token: write
    runs-on: Ubuntu-Latest
    environment: Deploy
    timeout-minutes: 1

    steps:
      - name: 🛣️ Set up Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:actions

      - name: 🔐 SSH to fetch
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: dummy
          script: |
            git -C "$GIT_PATH" fetch
            git -C "$GIT_PATH" reset -q --hard origin/main
          envs: GIT_PATH
        env:
          GIT_PATH: ${{ secrets.GIT_PATH }}

  deploy:
    name: ${{ matrix.compose.name }}
    permissions:
      id-token: write
    needs: [detect, fetch]
    runs-on: Ubuntu-Latest
    environment: Deploy
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        compose: ${{ fromJson(needs.detect.outputs.compose) }}

    steps:
      - name: 🛣️ Set up Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:actions

      - name: 🔐 SSH to deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: dummy
          script: docker compose -f "$COMPOSE_DIR/compose.yml" up -d --quiet-pull --remove-orphans
          envs: COMPOSE_DIR
        env:
          COMPOSE_DIR: ${{ secrets.GIT_PATH }}/${{ matrix.compose.dir }}

  cleanup:
    name: 🧹 Cleanup Docker Images and Volumes
    permissions:
      id-token: write
    needs: deploy
    runs-on: Ubuntu-Latest
    environment: Deploy
    timeout-minutes: 1

    steps:
      - name: 🛣️ Set up Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:actions

      - name: 🔐 SSH to cleanup
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: dummy
          script: |
            docker image prune -af
            docker volume prune -af
